<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none" role="img" aria-label="Rising skyline mark">
  <title>Rising skyline mark</title>
  <!-- skyline — civic blue #1F62E8, rising left to right -->
  <g fill="#1F62E8">
    <rect x="7"    y="42" width="11" height="14" rx="1.6"/>
    <rect x="20"   y="34" width="8"  height="22" rx="1.6"/>
    <rect x="30"   y="29" width="11" height="27" rx="1.6"/>
    <rect x="33"   y="23" width="5"  height="7"  rx="1"/>
    <rect x="43"   y="20" width="10" height="36" rx="1.6"/>
    <rect x="47.3" y="12" width="1.6" height="9"/>
  </g>
  <!-- amber signal #E8920B — rooftop beacon -->
  <circle cx="48.1" cy="11" r="2.5" fill="#E8920B"/>
  <!-- amber windows on a shared grid (rows 28 / 38 / 47) -->
  <g fill="#E8920B">
    <!-- building 4 (tallest) -->
    <rect x="45.2" y="28" width="2" height="2.6" rx=".4"/><rect x="48.8" y="28" width="2" height="2.6" rx=".4"/>
    <rect x="45.2" y="38" width="2" height="2.6" rx=".4"/><rect x="48.8" y="38" width="2" height="2.6" rx=".4"/>
    <rect x="45.2" y="47" width="2" height="2.6" rx=".4"/><rect x="48.8" y="47" width="2" height="2.6" rx=".4"/>
    <!-- building 3 -->
    <rect x="32.7" y="38" width="2" height="2.6" rx=".4"/><rect x="36.3" y="38" width="2" height="2.6" rx=".4"/>
    <rect x="32.7" y="47" width="2" height="2.6" rx=".4"/><rect x="36.3" y="47" width="2" height="2.6" rx=".4"/>
    <!-- building 2 -->
    <rect x="21.2" y="38" width="2" height="2.6" rx=".4"/><rect x="24.8" y="38" width="2" height="2.6" rx=".4"/>
    <rect x="21.2" y="47" width="2" height="2.6" rx=".4"/><rect x="24.8" y="47" width="2" height="2.6" rx=".4"/>
    <!-- building 1 (shortest) -->
    <rect x="9.7"  y="47" width="2" height="2.6" rx=".4"/><rect x="13.3" y="47" width="2" height="2.6" rx=".4"/>
  </g>
</svg>
