name: Data QC

# Runs on every PR that touches the dataset. Validates each changed record
# (schema + plausibility + swing-vs-current), comments a report, labels the PR,
# and auto-merges clean high-confidence updates from a trusted agent author.
# Everything else is a human gate.
on:
  pull_request:
    types: [opened, synchronize, reopened, labeled]
    paths: ['data/cities/**']

permissions:
  contents: write
  pull-requests: write
  issues: write

jobs:
  qc:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event.pull_request.head.sha }}
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install --quiet jsonschema
      - name: QC against the LATEST base branch (not the stale PR base.sha)
        env:
          BASE_REF: ${{ github.event.pull_request.base.ref }}
        run: |
          git fetch --no-tags --depth=50 origin "$BASE_REF"
          BASE=$(git rev-parse FETCH_HEAD)
          # trusted QC code + schema come from base, so a PR can't alter its own judge
          git checkout "$BASE" -- scripts/ schema/
          python scripts/qc-data-pr.py "$BASE"
      - name: Report, label, maybe auto-merge
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const v = JSON.parse(fs.readFileSync('verdict.json', 'utf8'));
            const { owner, repo } = context.repo;
            const number = context.payload.pull_request.number;
            const MARK = '<!-- tc-qc -->';
            const body = MARK + '\n' + v.report_md;

            // upsert a single QC comment
            const comments = await github.rest.issues.listComments({ owner, repo, issue_number: number, per_page: 100 });
            const existing = comments.data.find(c => c.body && c.body.includes(MARK));
            if (existing) {
              await github.rest.issues.updateComment({ owner, repo, comment_id: existing.id, body });
            } else {
              await github.rest.issues.createComment({ owner, repo, issue_number: number, body });
            }

            // labels reflect the verdict (best-effort — never block on labels)
            const MANAGED = ['qc-pass', 'qc-fail', 'needs-review'];
            const add = v.overall_pass ? (v.auto_mergeable ? ['qc-pass'] : ['qc-pass', 'needs-review']) : ['qc-fail'];
            for (const stale of MANAGED.filter(l => !add.includes(l))) {
              try { await github.rest.issues.removeLabel({ owner, repo, issue_number: number, name: stale }); } catch (e) { /* not present */ }
            }
            try { await github.rest.issues.addLabels({ owner, repo, issue_number: number, labels: add }); }
            catch (e) { core.warning('label add failed: ' + e.message); }

            // Auto-merge gate: clean + high-confidence QC AND the PR author is a
            // trusted agent identity (spoof-proof, unlike a label or branch name).
            // Empty list => auto-merge effectively off (safe default).
            const AGENT_AUTHORS = ['trendingcities-agent[bot]']; // dedicated agent bot identity (GitHub App)
            const author = context.payload.pull_request.user.login;
            // Community submissions are ALWAYS human-reviewed, even if clean — the
            // bot Function labels them, and that label excludes them from auto-merge.
            const isCommunity = (context.payload.pull_request.labels || []).map(l => l.name).includes('community-submission');
            if (v.auto_mergeable && AGENT_AUTHORS.includes(author) && !isCommunity) {
              try {
                await github.rest.pulls.merge({ owner, repo, pull_number: number, merge_method: 'squash' });
                await github.rest.issues.createComment({ owner, repo, issue_number: number,
                  body: '🤖 Auto-merged — passed QC, high-confidence, trusted agent author (`' + author + '`).' });
              } catch (e) {
                core.warning('auto-merge skipped (likely already merged): ' + e.message);
              }
            }

            if (!v.overall_pass) core.setFailed('Data QC failed — see the report comment.');
